name: Automated Scraper

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scrapers
        run: |
          python scraper.py
          python chart_scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          echo '--- Workspace listing ---'
          ls -la
          echo '--- Git status ---'
          git status --porcelain --untracked-files=all || true
          echo '--- Results preview (first 200 chars) ---'
          head -c 200 results.json || echo 'results.json missing'
          echo '\n--- Charts preview (first 200 chars) ---'
          head -c 200 monthly_charts.json || echo 'monthly_charts.json missing'

          git add -f results.json monthly_charts.json all_charts.json

          if git diff --staged --quiet; then
            echo 'No changes to commit.'
          else
              UPDATED_RESULTS=$(python -c "import json,sys; d=json.load(open('results.json')); print(d.get('updated_at') or d.get('last_updated') or '')") || true

              SOURCE_RESULTS=$(python -c "import json,sys; d=json.load(open('results.json')); print(d.get('source') or '')") || true

              UPDATED_CHARTS=$(python -c "import json,sys; d=json.load(open('monthly_charts.json')); print(d.get('updated_at') or d.get('last_updated') or '')") || true

              SOURCE_CHARTS=$(python -c "import json,sys; d=json.load(open('monthly_charts.json')); print(d.get('source') or '')") || true

            COMMIT_MSG="Auto-update: results=${UPDATED_RESULTS:-unknown} charts=${UPDATED_CHARTS:-unknown} src_results=${SOURCE_RESULTS:-unknown} src_charts=${SOURCE_CHARTS:-unknown} [skip ci]"
            echo "Committing: $COMMIT_MSG"
            git commit -m "$COMMIT_MSG"
            git push
          fi
